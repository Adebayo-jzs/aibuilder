<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagen \u2014 AI Landing Page Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2ED;
    --surface: #FEFCF9;
    --ink: #1A1714;
    --ink-muted: #6B6460;
    --ink-faint: #B8B2AB;
    --accent: #E8521A;
    --accent-soft: #FFF0EA;
    --accent-2: #2D5BE3;
    --accent-2-soft: #EEF2FF;
    --border: rgba(26,23,20,0.08);
    --shadow-sm: 0 1px 3px rgba(26,23,20,0.06), 0 1px 2px rgba(26,23,20,0.04);
    --shadow-md: 0 4px 16px rgba(26,23,20,0.08), 0 2px 6px rgba(26,23,20,0.04);
    --shadow-lg: 0 20px 60px rgba(26,23,20,0.12), 0 8px 20px rgba(26,23,20,0.06);
    --r: 14px;
    --r-lg: 24px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* \u2500\u2500 NAV \u2500\u2500 */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%; height: 64px;
    background: rgba(245,242,237,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 1.4rem; letter-spacing: -0.01em;
    color: var(--ink);
    text-decoration: none;
  }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    text-decoration: none; color: var(--ink-muted);
    font-size: 0.9rem; font-weight: 450;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-cta {
    background: var(--ink); color: #fff;
    border: none; border-radius: 100px;
    padding: 9px 22px; font-size: 0.875rem; font-weight: 500;
    cursor: pointer; transition: background .2s, transform .15s;
    font-family: inherit;
  }
  .nav-cta:hover { background: var(--accent); transform: translateY(-1px); }

  /* \u2500\u2500 HERO \u2500\u2500 */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 120px 5% 80px;
    position: relative; overflow: hidden;
  }

  .hero-orb {
    position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none;
  }
  .orb-1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,82,26,0.12) 0%, transparent 70%);
    top: -100px; left: -100px;
    animation: drift1 12s ease-in-out infinite;
  }
  .orb-2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(45,91,227,0.10) 0%, transparent 70%);
    bottom: 0; right: -80px;
    animation: drift2 15s ease-in-out infinite;
  }
  .orb-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(232,82,26,0.08) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    animation: pulse 8s ease-in-out infinite;
  }

  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }
  @keyframes pulse { 0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.2)} }

  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 100px; padding: 6px 14px;
    font-size: 0.78rem; font-weight: 500; color: var(--ink-muted);
    margin-bottom: 32px; box-shadow: var(--shadow-sm);
    animation: fadeUp 0.8s ease both;
  }
  .badge-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: blink 2s ease infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .hero-h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(3rem, 8vw, 7rem);
    line-height: 1.0; letter-spacing: -0.03em;
    max-width: 900px;
    margin-bottom: 24px;
    animation: fadeUp 0.8s 0.15s ease both;
  }
  .hero-h1 em {
    font-style: italic; color: var(--accent);
  }

  .hero-sub {
    font-size: clamp(1rem, 2vw, 1.2rem);
    color: var(--ink-muted); max-width: 520px;
    line-height: 1.7; font-weight: 350;
    margin-bottom: 40px;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .hero-actions {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    animation: fadeUp 0.8s 0.45s ease both;
  }
  .btn-primary {
    background: var(--ink); color: #fff;
    border: none; border-radius: 100px;
    padding: 15px 32px; font-size: 1rem; font-weight: 500;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 20px rgba(26,23,20,0.20);
    transition: all .25s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,82,26,0.35); }
  .btn-secondary {
    background: transparent; color: var(--ink);
    border: 1.5px solid var(--border); border-radius: 100px;
    padding: 14px 28px; font-size: 1rem; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: all .25s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-secondary:hover { border-color: var(--ink); transform: translateY(-2px); }

  .hero-visual {
    margin-top: 72px; position: relative;
    animation: fadeUp 0.9s 0.6s ease both;
    width: 100%; max-width: 900px;
  }

  .browser-frame {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.5) inset;
  }
  .browser-bar {
    background: #EFECE7;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .browser-dots { display: flex; gap: 6px; }
  .browser-dots span {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .dot-r { background: #FF5F57; }
  .dot-y { background: #FFBD2E; }
  .dot-g { background: #28CA41; }
  .browser-url {
    flex: 1; background: var(--surface);
    border-radius: 6px; padding: 5px 12px;
    font-size: 0.75rem; color: var(--ink-muted);
    border: 1px solid var(--border); text-align: left;
  }
  .browser-content {
    padding: 32px;
    background: linear-gradient(160deg, #fff 0%, #F9F6F1 100%);
    min-height: 280px;
    display: grid; grid-template-columns: 1fr 2fr; gap: 20px;
  }
  .mock-sidebar { display: flex; flex-direction: column; gap: 10px; }
  .mock-block {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    font-size: 0.75rem; color: var(--ink-muted);
  }
  .mock-block.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .mock-icon { font-size: 1rem; margin-bottom: 4px; }
  .mock-main { display: flex; flex-direction: column; gap: 14px; }
  .mock-hero-preview {
    background: linear-gradient(135deg, #1A1714 0%, #3D3530 100%);
    border-radius: 10px;
    padding: 28px;
    color: #fff;
  }
  .mock-headline {
    font-family: 'Instrument Serif', serif;
    font-size: 1.5rem; line-height: 1.2;
    margin-bottom: 8px;
  }
  .mock-sub { font-size: 0.72rem; opacity: .6; margin-bottom: 14px; }
  .mock-btn {
    display: inline-block;
    background: var(--accent);
    color: #fff; border-radius: 100px;
    padding: 6px 14px; font-size: 0.72rem; font-weight: 500;
  }
  .mock-features {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .mock-feat {
    background: var(--bg); border-radius: 8px;
    padding: 10px; border: 1px solid var(--border);
  }
  .mock-feat-title { font-size: 0.72rem; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
  .mock-feat-text { font-size: 0.65rem; color: var(--ink-muted); }

  /* \u2500\u2500 SHARED SECTION STYLES \u2500\u2500 */
  section { padding: 100px 5%; }
  .section-label {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 16px;
  }
  .section-label::before {
    content: ''; display: block;
    width: 20px; height: 2px; background: var(--accent);
    border-radius: 1px;
  }
  .section-h2 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    line-height: 1.1; letter-spacing: -0.025em;
    margin-bottom: 16px;
  }
  .section-h2 em { font-style: italic; color: var(--accent); }
  .section-sub {
    font-size: 1.05rem; color: var(--ink-muted);
    max-width: 520px; line-height: 1.7; font-weight: 350;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* \u2500\u2500 FEATURES \u2500\u2500 */
  .features { background: var(--surface); }
  .features-header { margin-bottom: 60px; }
  .features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }
  .feat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 32px;
    transition: all .3s;
    position: relative; overflow: hidden;
  }
  .feat-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent-soft) 0%, transparent 60%);
    opacity: 0; transition: opacity .3s;
  }
  .feat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: rgba(232,82,26,0.2); }
  .feat-card:hover::before { opacity: 1; }
  .feat-icon {
    width: 44px; height: 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    margin-bottom: 20px;
    position: relative; z-index: 1;
  }
  .feat-title {
    font-weight: 600; font-size: 1.05rem;
    margin-bottom: 8px; position: relative; z-index: 1;
  }
  .feat-text {
    color: var(--ink-muted); font-size: 0.9rem; line-height: 1.6;
    font-weight: 350; position: relative; z-index: 1;
  }

  /* \u2500\u2500 HOW IT WORKS \u2500\u2500 */
  .how { background: var(--bg); }
  .how-inner {
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
  }
  .steps { display: flex; flex-direction: column; gap: 0; }
  .step {
    display: flex; gap: 20px;
    padding: 28px 0;
    border-bottom: 1px solid var(--border);
    position: relative;
    cursor: pointer;
    transition: all .2s;
  }
  .step:last-child { border-bottom: none; }
  .step:hover .step-content h3 { color: var(--accent); }
  .step-num {
    width: 36px; height: 36px; min-width: 36px;
    border-radius: 50%;
    background: var(--surface); border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; font-weight: 600; color: var(--ink-muted);
    margin-top: 2px; transition: all .2s;
  }
  .step:hover .step-num {
    background: var(--accent); border-color: var(--accent);
    color: #fff;
  }
  .step-content h3 {
    font-weight: 600; font-size: 1rem; margin-bottom: 4px;
    transition: color .2s;
  }
  .step-content p {
    font-size: 0.88rem; color: var(--ink-muted); line-height: 1.6; font-weight: 350;
  }

  .how-visual {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }
  .how-visual-header {
    padding: 16px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem; font-weight: 600; color: var(--ink-muted);
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #28CA41; }
  .ai-chat { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .chat-bubble {
    max-width: 85%; padding: 12px 16px;
    border-radius: 16px; font-size: 0.85rem; line-height: 1.5;
  }
  .chat-user {
    background: var(--ink); color: #fff;
    border-radius: 16px 16px 4px 16px;
    align-self: flex-end;
  }
  .chat-ai {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 16px 16px 16px 4px;
    align-self: flex-start;
  }
  .chat-ai-name {
    font-size: 0.7rem; font-weight: 600; color: var(--accent);
    margin-bottom: 4px;
  }
  .chat-generating {
    display: flex; gap: 5px; align-items: center; padding: 4px 0;
  }
  .gen-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink-faint);
    animation: bounce 1.2s ease infinite;
  }
  .gen-dot:nth-child(2) { animation-delay: .2s; }
  .gen-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(.8);opacity:.4} 40%{transform:scale(1);opacity:1} }
  .progress-bar {
    height: 3px; background: var(--border);
    border-radius: 2px; overflow: hidden; margin-top: 8px;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2));
    width: 72%;
    border-radius: 2px;
    animation: grow 3s ease infinite;
  }
  @keyframes grow { 0%{width:15%} 100%{width:95%} }

  /* \u2500\u2500 TESTIMONIALS \u2500\u2500 */
  .testimonials { background: var(--ink); color: #fff; }
  .testimonials .section-label { color: #E8521A; }
  .testimonials .section-label::before { background: var(--accent); }
  .testimonials .section-h2 { color: #fff; }
  .testimonials .section-sub { color: rgba(255,255,255,0.5); }
  .testi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px; margin-top: 60px;
  }
  .testi-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--r-lg); padding: 32px;
    transition: all .3s;
  }
  .testi-card:hover {
    background: rgba(255,255,255,0.08);
    transform: translateY(-4px);
    border-color: rgba(232,82,26,0.3);
  }
  .testi-stars { color: var(--accent); font-
